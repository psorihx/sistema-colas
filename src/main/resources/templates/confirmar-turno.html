<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Asistencia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .turno-display {
            font-size: 80px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 20px 0;
        }
        .timer.warning {
            color: #f39c12;
        }
        .timer.danger {
            color: #e74c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .info {
            text-align: left;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }
        .info-item {
            margin-bottom: 12px;
            color: #555;
        }
        .info-item strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Por favor confirme su asistencia</h2>
        <div class="turno-display" th:text="${turno.numeroTurno}"></div>
        <div class="info">
            <div class="info-item"><strong>Cliente:</strong> <span th:text="${turno.nombreCliente}"></span></div>
            <div class="info-item"><strong>Trámite:</strong> <span th:text="${tipoTramite.nombre}"></span></div>
        </div>
        <div class="timer" id="timer">60</div>
        <form th:action="@{/confirmar-asistencia}" method="post">
            <input type="hidden" name="numeroTurno" th:value="${turno.numeroTurno}">
            <button type="submit">Confirmar Asistencia</button>
        </form>
    </div>
    <script>
        let timeLeft = 60;
        const timerElement = document.getElementById('timer');
        
        function updateTimer() {
            timerElement.textContent = timeLeft;
            
            if (timeLeft <= 10) {
                timerElement.classList.add('danger');
                timerElement.classList.remove('warning');
            } else if (timeLeft <= 30) {
                timerElement.classList.add('warning');
                timerElement.classList.remove('danger');
            }
            
            if (timeLeft <= 0) {
                alert('⚠️ Tiempo agotado! Su turno ha sido cancelado.');
                window.location.href = '/seleccion-tramite';
            } else {
                timeLeft--;
                setTimeout(updateTimer, 1000);
            }
        }
        
        updateTimer();
    </script>
</body>
</html>
