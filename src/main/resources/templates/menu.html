<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menú Principal - Sistema de Colas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: #333;
            font-size: 24px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info span {
            color: #555;
            font-weight: 500;
        }
        .logout-btn {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .menu-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .menu-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .menu-card h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 10px;
        }
        .menu-card p {
            color: #777;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sistema de Colas - Menú Principal</h1>
        <div class="user-info">
            <span>Bienvenido, <strong th:text="${#authentication != null ? #authentication.name : 'Invitado'}"></strong></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">Cerrar Sesión</button>
            </form>
        </div>
    </div>
    <div class="menu-grid">
        <a href="/seleccion-tramite" class="menu-card">
            <div class="menu-icon">🎫</div>
            <h2>Registrar Turno</h2>
            <p>Generar un nuevo turno para un cliente</p>
        </a>
        <a href="/ver-turnos" class="menu-card">
            <div class="menu-icon">📋</div>
            <h2>Ver Turnos</h2>
            <p>Consultar todos los turnos del sistema</p>
        </a>
        <a href="/administrar-turnos" class="menu-card">
            <div class="menu-icon">⚙️</div>
            <h2>Administrar Turnos</h2>
            <p>Gestionar el estado de los turnos</p>
        </a>
    </div>
</body>
</html>
